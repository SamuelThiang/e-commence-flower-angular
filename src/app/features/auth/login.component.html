<div
  class="min-h-screen flex items-center justify-center px-4 md:px-8 pt-24 pb-12 bg-surface"
>
  <div class="w-full max-w-md">
    <div
      class="glass-card p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl border border-white/20"
    >
      <div class="text-center mb-8 md:mb-10">
        <h1 class="text-3xl md:text-4xl font-bold tracking-tighter text-zinc-900 mb-2">
          Welcome Back
        </h1>
        <p class="text-on-surface-variant font-sans text-xs md:text-sm">
          Sign in to manage your botanical gallery.
        </p>
      </div>

      <button
        type="button"
        (click)="google()"
        class="w-full py-5 rounded-full bg-white border border-zinc-200 text-zinc-900 font-bold text-xs uppercase tracking-[0.2em] shadow-sm hover:bg-zinc-50 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 mb-8"
      >
        <img
          src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
          alt="Google"
          class="w-5 h-5"
        />
        Sign In with Google
      </button>

      <div class="relative mb-8">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-zinc-100"></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase tracking-widest">
          <span class="bg-white px-4 text-zinc-400">Or continue with email</span>
        </div>
      </div>

      <form class="space-y-6" (submit)="submit($event)">
        <div class="space-y-2">
          <label
            class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 ml-1"
            >Email Address</label
          >
          <input
            type="email"
            required
            [value]="email()"
            (input)="email.set($any($event.target).value); clearSubmitError()"
            class="w-full bg-surface-container-high border-none rounded-2xl px-6 py-4 text-zinc-900 focus:ring-2 focus:ring-zinc-900 transition-all"
            placeholder="curator@ethereal.com"
          />
          @if (showEmailError()) {
            <p class="ml-1 mt-1 text-[10px] text-red-600">Please enter a valid email address.</p>
          }
          @if (emailApiError(); as emailErr) {
            <p class="ml-1 mt-1 text-[10px] text-red-600" role="alert">{{ emailErr }}</p>
          }
        </div>
        <div class="space-y-2">
          <label
            class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 ml-1"
            >Password</label
          >
          <div class="relative">
            <input
              [attr.type]="showPassword() ? 'text' : 'password'"
              required
              [value]="password()"
              (input)="password.set($any($event.target).value); clearSubmitError()"
              class="w-full bg-surface-container-high border-none rounded-2xl pl-6 pr-14 py-4 text-zinc-900 focus:ring-2 focus:ring-zinc-900 transition-all"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-xl text-zinc-500 hover:text-zinc-900 hover:bg-zinc-100/80 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-zinc-900 focus-visible:ring-offset-2"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="showPassword()"
            >
              @if (showPassword()) {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="w-5 h-5"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"
                  />
                </svg>
              } @else {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="w-5 h-5"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                </svg>
              }
            </button>
          </div>
          @if (passwordApiError(); as pwdErr) {
            <p class="ml-1 mt-1 text-[10px] text-red-600" role="alert">{{ pwdErr }}</p>
          }
        </div>

        <div class="flex items-center justify-between px-1">
          <label class="flex items-center gap-2 cursor-pointer group">
            <input
              type="checkbox"
              class="w-4 h-4 rounded border-zinc-300 text-zinc-900 focus:ring-zinc-900"
            />
            <span
              class="text-xs text-on-surface-variant group-hover:text-zinc-900 transition-colors"
              >Remember me</span
            >
          </label>
          <button
            type="button"
            class="text-xs font-bold text-zinc-900 hover:opacity-70 transition-opacity"
          >
            Forgot Password?
          </button>
        </div>

        <button
          type="submit"
          class="w-full py-5 rounded-full bg-zinc-900 text-white font-bold text-xs uppercase tracking-[0.2em] shadow-lg hover:bg-zinc-800 active:scale-[0.98] transition-all duration-300"
        >
          Sign In
        </button>
      </form>

      <div class="mt-10 pt-8 border-t border-zinc-100 text-center">
        <p class="text-sm text-on-surface-variant mb-4">New to the gallery?</p>
        <a
          routerLink="/register"
          class="text-sm font-bold text-zinc-900 hover:underline underline-offset-4 decoration-zinc-300 transition-all"
          >Create an Account</a
        >
      </div>
    </div>
  </div>
</div>
