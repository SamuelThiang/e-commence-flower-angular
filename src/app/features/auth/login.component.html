<div
  class="min-h-screen flex items-center justify-center px-4 md:px-8 pt-24 pb-12 bg-surface"
>
  <div class="w-full max-w-md">
    <div
      class="glass-card p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl border border-white/20"
    >
      <div class="text-center mb-8 md:mb-10">
        <h1 class="text-3xl md:text-4xl font-bold tracking-tighter text-zinc-900 mb-2">
          Welcome Back
        </h1>
        <p class="text-on-surface-variant font-sans text-xs md:text-sm">
          Sign in to manage your botanical gallery.
        </p>
      </div>

      <button
        type="button"
        (click)="google()"
        class="w-full py-5 rounded-full bg-white border border-zinc-200 text-zinc-900 font-bold text-xs uppercase tracking-[0.2em] shadow-sm hover:bg-zinc-50 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 mb-8"
      >
        <img
          src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
          alt="Google"
          class="w-5 h-5"
        />
        Sign In with Google
      </button>

      <div class="relative mb-8">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-zinc-100"></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase tracking-widest">
          <span class="bg-white px-4 text-zinc-400">Or continue with email</span>
        </div>
      </div>

      <form class="space-y-6" (submit)="submit($event)">
        <div class="space-y-2">
          <label
            class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 ml-1"
            >Email Address</label
          >
          <input
            type="email"
            required
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            class="w-full bg-surface-container-high border-none rounded-2xl px-6 py-4 text-zinc-900 focus:ring-2 focus:ring-zinc-900 transition-all"
            placeholder="curator@ethereal.com"
          />
        </div>
        <div class="space-y-2">
          <label
            class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 ml-1"
            >Password</label
          >
          <input
            type="password"
            required
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            class="w-full bg-surface-container-high border-none rounded-2xl px-6 py-4 text-zinc-900 focus:ring-2 focus:ring-zinc-900 transition-all"
            placeholder="••••••••"
          />
        </div>

        <div class="flex items-center justify-between px-1">
          <label class="flex items-center gap-2 cursor-pointer group">
            <input
              type="checkbox"
              class="w-4 h-4 rounded border-zinc-300 text-zinc-900 focus:ring-zinc-900"
            />
            <span
              class="text-xs text-on-surface-variant group-hover:text-zinc-900 transition-colors"
              >Remember me</span
            >
          </label>
          <button
            type="button"
            class="text-xs font-bold text-zinc-900 hover:opacity-70 transition-opacity"
          >
            Forgot Password?
          </button>
        </div>

        <button
          type="submit"
          class="w-full py-5 rounded-full bg-zinc-900 text-white font-bold text-xs uppercase tracking-[0.2em] shadow-lg hover:bg-zinc-800 active:scale-[0.98] transition-all duration-300"
        >
          Sign In
        </button>
      </form>

      <div class="mt-10 pt-8 border-t border-zinc-100 text-center">
        <p class="text-sm text-on-surface-variant mb-4">New to the gallery?</p>
        <a
          routerLink="/register"
          class="text-sm font-bold text-zinc-900 hover:underline underline-offset-4 decoration-zinc-300 transition-all"
          >Create an Account</a
        >
      </div>
    </div>
  </div>
</div>
