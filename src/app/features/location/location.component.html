<div class="pt-32 pb-24 px-8 max-w-[1440px] mx-auto min-h-screen">
  <header class="mb-16">
    <div
      class="flex flex-col lg:flex-row lg:items-end justify-between gap-8 mb-12"
    >
      <div>
        <h1
          class="text-5xl font-extrabold tracking-tighter text-on-surface mb-4 italic"
        >
          Our Galleries
        </h1>
        <p class="text-on-surface-variant font-medium max-w-2xl">
          Experience the artistry of our specimens in person at our flagship
          Malaysia galleries.
        </p>
      </div>
    </div>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
    @for (loc of locations; track loc.city) {
      <div
        class="glass-card rounded-[2.5rem] overflow-hidden border border-zinc-100 shadow-xl group"
      >
        <div class="h-80 overflow-hidden">
          <img
            [src]="loc.image"
            [alt]="loc.city"
            class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110"
          />
        </div>
        <div class="p-12 space-y-8">
          <div>
            <h2 class="text-3xl font-bold tracking-tighter mb-2">
              {{ loc.city }}
            </h2>
            <p class="text-on-surface-variant font-medium">{{ loc.address }}</p>
          </div>
          <div class="grid grid-cols-2 gap-8">
            <div class="space-y-2">
              <label
                class="text-[10px] font-bold uppercase tracking-widest text-zinc-400"
                >Contact</label
              >
              <p class="text-sm font-bold">{{ loc.phone }}</p>
            </div>
            <div class="space-y-2">
              <label
                class="text-[10px] font-bold uppercase tracking-widest text-zinc-400"
                >Hours</label
              >
              <p class="text-sm font-bold">{{ loc.hours }}</p>
            </div>
          </div>
          <button
            type="button"
            (click)="openMaps(loc.address)"
            class="w-full py-4 border border-zinc-900 text-zinc-900 font-bold text-[10px] uppercase tracking-[0.2em] rounded-full hover:bg-zinc-900 hover:text-white transition-all"
          >
            Get Directions
          </button>
        </div>
      </div>
    }
  </div>
</div>
