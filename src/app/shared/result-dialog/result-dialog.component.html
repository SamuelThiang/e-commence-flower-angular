@if (open()) {
  <div
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-zinc-900/45 backdrop-blur-[2px]"
    role="presentation"
  >
    <div
      [attr.role]="useAlertRole() ? 'alertdialog' : 'dialog'"
      aria-modal="true"
      [attr.aria-labelledby]="headingId"
      [attr.aria-describedby]="useAlertRole() ? descriptionId : null"
      class="w-full max-w-[320px] rounded-[14px] bg-[#f7f7f8] shadow-2xl overflow-hidden border border-zinc-200/80"
      (click)="$event.stopPropagation()"
    >
      <div class="px-8 pt-9 pb-7 text-center">
        @if (variant() === 'success') {
          <div
            class="mx-auto mb-6 flex h-[72px] w-[72px] items-center justify-center rounded-full bg-emerald-100/90"
          >
            <div
              class="flex h-[52px] w-[52px] items-center justify-center rounded-full bg-emerald-800 shadow-inner"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-7 w-7 text-white"
                aria-hidden="true"
              >
                <path d="M5 13l4 4L19 7" />
              </svg>
            </div>
          </div>
        } @else if (variant() === 'info') {
          <div
            class="mx-auto mb-6 flex h-[72px] w-[72px] items-center justify-center rounded-full bg-indigo-100/90"
          >
            <div
              class="flex h-[52px] w-[52px] items-center justify-center rounded-full bg-indigo-700 shadow-inner"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-7 w-7 text-white"
                aria-hidden="true"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
              </svg>
            </div>
          </div>
        } @else {
          <div
            class="mx-auto mb-6 flex h-[72px] w-[72px] items-center justify-center rounded-full bg-rose-100/90"
          >
            <div
              class="flex h-[52px] w-[52px] items-center justify-center rounded-full bg-rose-700 shadow-inner"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="h-7 w-7 text-white"
                aria-hidden="true"
              >
                <path d="M18 6 6 18M6 6l12 12" />
              </svg>
            </div>
          </div>
        }

        <h2
          [id]="headingId"
          class="text-[17px] font-bold tracking-tight text-zinc-800"
        >
          {{ heading() }}
        </h2>
        <p
          [id]="descriptionId"
          class="mt-2.5 text-[13px] leading-relaxed text-zinc-500"
        >
          {{ message() }}
        </p>
        @if (detailLine(); as line) {
          <p class="mt-3 font-mono text-[11px] text-zinc-400 tracking-tight">
            {{ line }}
          </p>
        }
      </div>
      <div class="border-t border-zinc-200/90">
        <button
          type="button"
          (click)="primaryAction.emit()"
          class="w-full py-3.5 text-[15px] font-semibold text-indigo-600 hover:bg-zinc-100/90 active:bg-zinc-100 transition-colors"
        >
          {{ primaryLabel() }}
        </button>
      </div>
    </div>
  </div>
}
